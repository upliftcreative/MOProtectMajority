<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Breaking News Ad – 300x250</title>
  <link rel="stylesheet" href="style.css">
  
</head>

<body>

<div id="ad-wrapper">

  <!-- ══ SCENE 2 — rendered first in DOM so it's below scene 1 ══ -->
  <div id="scene2">
    <div class="s2-bg"></div>
    <div class="s2-network-bug" id="s2Bug">
      <div class="s2-bug-dot"></div>
      <span class="s2-bug-label">Missouri News</span>
    </div>
    <div class="s2-chyron" id="s2Chyron">
      <div class="s2-chyron-eyebrow" id="s2Eyebrow">
        <span>Election Alert</span>
        <div class="s2-chyron-eyebrow-line"></div>
      </div>
      <div class="s2-chyron-body">
        <div class="s2-chyron-main">
          Vote <em>NO</em> on Amendment 4<br>by August 4th
        </div>
      </div>
    </div>
  </div>

  <!-- ══ SCENE 1 — on top at start ══ -->
  <div id="scene1">
    <div class="s1-bg"></div>
    <div class="s1-top-line" id="s1TopLine"></div>
    <div class="s1-network-bug" id="s1Bug">
      <div class="s1-bug-dot"></div>
      <span class="s1-bug-label">Missouri News</span>
    </div>
    <div class="s1-breaking-wrap">
      <div class="s1-breaking-bar" id="s1Bar">
        <span class="s1-breaking-text">Breaking News</span>
      </div>
    </div>
    <p class="s1-headline" id="s1Headline">
      Amendment 4<br>
      <em>Ends Majority Rule</em><br>
      in Missouri
    </p>
  </div>

  <!-- ══ WIPE CANVAS — draws transition on top of current scene ══ -->
  <canvas id="wipe-canvas" width="300" height="250"></canvas>

  <!-- ══ PERSISTENT ══ -->
  <div id="persistent">
    
    <div id="disclaimer">
      <p>Paid for by Protect Majority Rule Missouri, Mike Pridmore, Treasurer.</p>
    </div>
  </div>

</div>

<script src="gsap.min.js"></script>
<script src="script.js"></script>


</body>
</html>
