<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Breaking News Ad – 300x250</title>
  <script src="gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      height: 250px;
      overflow: hidden;
      font-family: 'Arial Narrow', Arial, sans-serif;
      background: #000;
    }

    #ad-wrapper {
      position: relative;
      width: 300px;
      height: 250px;
      overflow: hidden;
    }

    /* ─── Z-INDEX STACK (bottom → top) ────────────────────────────────
       1  scene2   (sits behind everything, revealed when scene1 hides)
       2  scene1   (on top at start, hidden mid-wipe)
       10 wipe-canvas  (draws the transition disc over whichever scene is showing)
       20 persistent   (logo + disclaimer, never touched by transitions)
    ─────────────────────────────────────────────────────────────────── */

    /* ─── SCENE 1 ──────────────────────────────────────────────────── */
    #scene1 {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 40px;
      overflow: hidden;
    }

    /* Background image for scene 1 */
    .s1-bg {
      position: absolute;
      inset: 0;
      /* ↓↓↓ SWAP SCENE 1 IMAGE HERE ↓↓↓ */
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
    }
    /* Dark overlay so news graphics read clearly */
    .s1-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.62);
    }

    /* Scan-line texture */
    #scene1::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.018) 0px,
        rgba(255,255,255,0.018) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* All scene1 content needs z-index > 0 to sit above the bg div */
    .s1-top-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #e8000d;
      transform: scaleX(0);
      transform-origin: left;
      z-index: 2;
    }

    .s1-network-bug {
      position: absolute;
      top: 12px; left: 14px;
      display: flex; align-items: center; gap: 6px;
      opacity: 0;
      z-index: 2;
    }
    .s1-bug-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e8000d;
    }
    .s1-bug-label {
      font-size: 9px; font-weight: 700;
      color: #fff; letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .s1-breaking-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
      z-index: 2;
    }
    .s1-breaking-bar {
      background: #e8000d;
      padding: 6px 24px;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      opacity: 0;
      transform: scaleX(0);
      transform-origin: center;
    }
    .s1-breaking-text {
      font-size: 22px; font-weight: 900;
      color: #fff; letter-spacing: 4px;
      text-transform: uppercase; font-style: italic;
    }

    .s1-headline {
      font-size: 25px; font-weight: 700;
      color: #fff; text-align: center;
      line-height: 1.3; max-width: 240px;
      opacity: 0; transform: translateY(10px);
      z-index: 2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    .s1-headline em { color: #e8000d; font-style: normal; }

    /* ─── SCENE 2 ──────────────────────────────────────────────────── */
    #scene2 {
      position: absolute;
      inset: 0;
      z-index: 1;   /* BELOW scene1 */
      padding-bottom: 20px;
    }

    .s2-bg {
      position: absolute;
      inset: 0;
      /* ↓↓↓ SWAP SCENE 2 IMAGE HERE ↓↓↓ */
      background-image: url(bg2.jpg);
      background-size: cover;
      background-position: center;
    }
    .s2-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0.45) 100%
      );
    }

    .s2-network-bug {
      position: absolute;
      top: 12px; left: 14px;
      display: flex; align-items: center; gap: 6px;
      z-index: 3; opacity: 0;
    }
    .s2-bug-dot {
      width: 8px; height: 8px;
      border-radius: 50%; background: #e8000d;
    }
    .s2-bug-label {
      font-size: 9px; font-weight: 700;
      color: #fff; letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .s2-chyron {
      position: absolute;
      bottom: 8px; left: 0; right: 0;
      z-index: 3;
      transform: translateY(70px);
      opacity: 0;
    }
    .s2-chyron-eyebrow {
      display: flex; align-items: center;
      background: #e8000d;
      padding: 4px 14px;
      width: fit-content;
      clip-path: inset(0 100% 0 0);
    }
    .s2-chyron-eyebrow span {
      font-size: 9px; font-weight: 900;
      letter-spacing: 2px; color: #fff;
      text-transform: uppercase;
    }
    .s2-chyron-eyebrow-line {
      width: 16px; height: 2px;
      background: #fff; margin-left: 8px;
    }
    .s2-chyron-body {
      background: rgba(10,10,10,0.92);
      border-left: 5px solid #e8000d;
      padding: 8px 14px 10px;
    }
    .s2-chyron-main {
      font-size: 24px; font-weight: 900;
      color: #fff; line-height: 1.15;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .s2-chyron-main em { color: #e8000d; font-style: normal; }
    .s2-chyron-sub {
      font-size: 10px; font-weight: 400;
      color: #ccc; letter-spacing: 1px;
      margin-top: 4px; text-transform: uppercase;
    }

    /* ─── WIPE CANVAS ──────────────────────────────────────────────── */
    #wipe-canvas {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* ─── PERSISTENT ───────────────────────────────────────────────── */
    #persistent {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    #logo {
  position: absolute;
  top: 8px; right: 10px;
  width: 100px;
  height: auto;
  background: rgba(255, 255, 255, 0.78);
  padding: 2px 4px;
  filter: drop-shadow(0 1px 3px rgba(161, 161, 161, 0.7));
}

    #disclaimer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 20px;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }
    #disclaimer p {
      font-size: 9px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      letter-spacing: 0.3px;
      line-height: 1.0;
    }
  </style>
</head>
<body>

<div id="ad-wrapper">

  <!-- ══ SCENE 2 — rendered first in DOM so it's below scene 1 ══ -->
  <div id="scene2">
    <div class="s2-bg"></div>
    <div class="s2-network-bug" id="s2Bug">
      <div class="s2-bug-dot"></div>
      <span class="s2-bug-label">Missouri News</span>
    </div>
    <div class="s2-chyron" id="s2Chyron">
      <div class="s2-chyron-eyebrow" id="s2Eyebrow">
        <span>Election Alert</span>
        <div class="s2-chyron-eyebrow-line"></div>
      </div>
      <div class="s2-chyron-body">
        <div class="s2-chyron-main">
          Vote <em>NO</em> on<br>Amendment 4<br>by August 4th
        </div>
      </div>
    </div>
  </div>

  <!-- ══ SCENE 1 — on top at start ══ -->
  <div id="scene1">
    <div class="s1-bg"></div>
    <div class="s1-top-line" id="s1TopLine"></div>
    <div class="s1-network-bug" id="s1Bug">
      <div class="s1-bug-dot"></div>
      <span class="s1-bug-label">Missouri News</span>
    </div>
    <div class="s1-breaking-wrap">
      <div class="s1-breaking-bar" id="s1Bar">
        <span class="s1-breaking-text">Breaking News</span>
      </div>
    </div>
    <p class="s1-headline" id="s1Headline">
      Amendment 4<br>
      <em>Ends Majority Rule</em><br>
      in Missouri
    </p>
  </div>

  <!-- ══ WIPE CANVAS — draws transition on top of current scene ══ -->
  <canvas id="wipe-canvas" width="300" height="250"></canvas>

  <!-- ══ PERSISTENT ══ -->
  <div id="persistent">
    <img id="logo" src="logo.png" alt="Logo" onerror="this.style.display='none'" />
    <div id="disclaimer">
      <p>Paid for by Protect Majority Rule Missouri, Mike Pridmore, Treasurer.</p>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   HOW THE WIPE WORKS (no more blink):

   FORWARD  (S1 → S2):
     - Scene1 is visible (z2), Scene2 is below it (z1)
     - Red disc expands on canvas OVER Scene1
     - Once disc fully covers frame → hide Scene1, clear canvas instantly
     - Scene2 is already there, no flash, no reveal needed

   REVERSE  (S2 → S1):
     - Scene2 is visible (z1), Scene1 is hidden
     - Show Scene1 behind canvas (still hidden by full red rect on canvas)
     - Red rect with shrinking hole collapses over Scene2
     - Once hole reaches 0 → clear canvas, Scene1 is visible underneath
   ══════════════════════════════════════════════════════════════════ */

const canvas = document.getElementById('wipe-canvas');
const ctx    = canvas.getContext('2d');
const W = 300, H = 250;
const cx = W / 2, cy = H / 2;
const MAX_R = Math.sqrt(cx*cx + cy*cy) + 4;

const RINGS = [
  { offset: 0,    thickness: 18, color: '#2a2a2a' },
  { offset: 0.08, thickness: 13, color: '#e8000d'    },
  { offset: 0.16, thickness: 8,  color: '#888'    },
];

const wipe = { r: 0, phase: 'idle' };

function drawWipe() {
  ctx.clearRect(0, 0, W, H);
  if (wipe.phase === 'idle') return;

  if (wipe.phase === 'expand') {
    // Growing red disc over Scene 1
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, Math.max(0, wipe.r), 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.restore();
    // Rings trail at leading edge
    RINGS.forEach(ring => {
      const rr = wipe.r - ring.offset * MAX_R;
      if (rr <= 0) return;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, rr, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color;
      ctx.lineWidth   = ring.thickness;
      ctx.stroke();
      ctx.restore();
    });
  }

  if (wipe.phase === 'collapse') {
    // Full red rect with a transparent hole shrinking to zero
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(cx, cy, Math.max(0, wipe.r), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Rings on trailing edge of hole
    RINGS.forEach(ring => {
      const rr = wipe.r + ring.offset * MAX_R;
      if (rr > MAX_R + 50) return;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, rr, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color;
      ctx.lineWidth   = ring.thickness;
      ctx.stroke();
      ctx.restore();
    });
  }
}

gsap.ticker.add(drawWipe);

// Blinking bug dots
gsap.to(['.s1-bug-dot','.s2-bug-dot'], {
  opacity: 0, duration: 0.5,
  repeat: -1, yoyo: true, ease: 'power1.inOut'
});

/* ══════════════════════════════════════════════════════════════════
   MASTER TIMELINE
   ══════════════════════════════════════════════════════════════════ */
function buildMaster() {
  // Ensure clean initial state
  gsap.set('#scene1',    { autoAlpha: 1 });
  gsap.set('#scene2',    { autoAlpha: 1 }); // always visible, just behind scene1
  gsap.set('#s2Bug',     { opacity: 0 });
  gsap.set('#s2Chyron',  { opacity: 0, y: 70 });
  gsap.set('#s2Eyebrow', { clipPath: 'inset(0 100% 0 0)' });

  const tl = gsap.timeline({
    repeat: -1,
    onRepeat() {
      // Hard-reset all animated elements the instant the loop restarts
      gsap.set('#s1TopLine', { scaleX: 0 });
      gsap.set(['#s1Bug'],   { opacity: 0 });
      gsap.set('#s1Bar',     { opacity: 0, scaleX: 0 });
      gsap.set('#s1Headline',{ opacity: 0, y: 10 });
      gsap.set('#s2Bug',     { opacity: 0 });
      gsap.set('#s2Chyron',  { opacity: 0, y: 70 });
      gsap.set('#s2Eyebrow', { clipPath: 'inset(0 100% 0 0)' });
      wipe.phase = 'idle';
      ctx.clearRect(0, 0, W, H);
    }
  });

  /* ── Scene 1 intro ──────────────────────────────────────────── */
  tl.to('#s1TopLine', { scaleX: 1, duration: 0.35, ease: 'power2.out' }, 0.1)
    .to('#s1Bug',     { opacity: 1, duration: 0.3 }, 0.2)
    .to('#s1Bar',     { opacity: 1, scaleX: 1, duration: 0.45, ease: 'back.out(1.4)' }, 0.5)
    .to('#s1Headline',{ opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 0.9);

  /* ── EXPAND WIPE: red disc grows over Scene 1 ───────────────── */
  const EXP = 3.5;
  tl.call(() => {
    wipe.phase = 'expand';
    wipe.r = 0;
  }, null, EXP)
  .to(wipe, {
    r: MAX_R,
    duration: 0.65,
    ease: 'power2.inOut',
    onComplete() {
      // Disc fully covers frame — safe to hide Scene 1 & clear canvas together
      gsap.set('#scene1', { autoAlpha: 0 });
      wipe.phase = 'idle';
      ctx.clearRect(0, 0, W, H);
      // Scene 2 is already below, now fully visible
    }
  }, EXP);

  /* ── Scene 2 intro ──────────────────────────────────────────── */
  const S2 = EXP + 0.65;
  tl.to('#s2Bug',    { opacity: 1, duration: 0.3 }, S2)
    .to('#s2Chyron', { opacity: 1, y: 0, duration: 0.45, ease: 'power3.out' }, S2 + 0.15)
    .to('#s2Eyebrow',{ clipPath: 'inset(0 0% 0 0)', duration: 0.4, ease: 'power2.out' }, S2 + 0.45);

  /* ── COLLAPSE WIPE: red rect shrinks over Scene 2 → Scene 1 ── */
  const COL = 6.8;
  tl.call(() => {
    // Prep Scene 1 behind the canvas before collapse begins
    gsap.set('#s1TopLine', { scaleX: 0 });
    gsap.set('#s1Bug',     { opacity: 0 });
    gsap.set('#s1Bar',     { opacity: 0, scaleX: 0 });
    gsap.set('#s1Headline',{ opacity: 0, y: 10 });
    wipe.phase = 'collapse';
    wipe.r = MAX_R;
  }, null, COL)
  .to(wipe, {
    r: 0,
    duration: 0.65,
    ease: 'power2.inOut',
    onComplete() {
       gsap.set('#scene1', { autoAlpha: 1 });
       wipe.phase = 'idle';
       ctx.clearRect(0, 0, W, H);
}
  }, COL);

  // Lock total duration so repeat fires at exactly 6s with no black frame
  tl.set({}, {}, 7.45);

  return tl;
}

buildMaster();
</script>
</body>
</html>
